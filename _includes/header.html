{% assign t = include.t %}
{% assign lang = include.lang %}
<header class="navigation fixed-top">
  <nav class="navbar navbar-expand-lg navbar-dark">
    <a class="navbar-brand font-tertiary h3" href="{{ site.baseurl }}/">
      {% if site.data.settings.logo %}
        <img src="{{ site.data.settings.logo | absolute_url }}" alt="{{ site.data.settings.title }}">
        {% else if %}
        <h3 class="text-white font-tertiary">{{site.data.settings.title}}</h3>
      {% endif %}
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navigation"
      aria-controls="navigation" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse text-center" id="navigation">
      <ul class="navbar-nav ms-auto align-items-center">
        <!-- Language Switcher -->
        <li class="nav-item dropdown ms-lg-3">
          <a class="nav-link dropdown-toggle font-monospace small" href="#" id="languageDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
            {{ lang | upcase }}
          </a>
          <ul class="dropdown-menu dropdown-menu-dark glass border-0 shadow" aria-labelledby="languageDropdown">
            <li><a class="dropdown-item small {% if lang == 'en' %}active{% endif %}" href="{{ site.baseurl }}/">EN - ENGLISH</a></li>
            <li><a class="dropdown-item small {% if lang == 'fr' %}active{% endif %}" href="{{ site.baseurl }}/fr/">FR - FRANÇAIS</a></li>
          </ul>
        </li>
      </ul>
    </div>
  </nav>
</header>
