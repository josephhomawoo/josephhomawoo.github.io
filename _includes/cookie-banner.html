{% if site.data.settings.google-analytics %}
<div id="cookie-consent-banner" class="cookie-banner-container glass p-4 d-none" style="position: fixed; bottom: 20px; right: 20px; max-width: 420px; z-index: 9999; border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4); animation: slideUp 0.5s ease-out;">
  <h5 class="text-white mb-2 font-monospace"><i class="ti-info-alt text-primary me-2"></i>{{ t.cookies.title }}</h5>
  <p class="text-secondary small mb-3" style="line-height: 1.5; font-size: 0.85rem;">
    {{ t.cookies.text }}
  </p>
  <div class="d-flex justify-content-end gap-2">
    <button id="btn-cookie-decline" class="btn btn-sm btn-outline-light px-3 py-2 font-monospace" style="font-size: 0.75rem;">
      {{ t.cookies.decline }}
    </button>
    <button id="btn-cookie-accept" class="btn btn-sm btn-primary px-3 py-2 font-monospace" style="font-size: 0.75rem;">
      {{ t.cookies.accept }}
    </button>
  </div>
</div>

<style>
  @keyframes slideUp {
    from {
      transform: translateY(100px);
      opacity: 0;
    }
    to {
      transform: translateY(0);
      opacity: 1;
    }
  }
</style>

<script>
  (function () {
    var banner = document.getElementById('cookie-consent-banner');
    var btnAccept = document.getElementById('btn-cookie-accept');
    var btnDecline = document.getElementById('btn-cookie-decline');

    if (!banner || !btnAccept || !btnDecline) return;

    // Check if consent has already been chosen
    var choice = localStorage.getItem('cookie-consent-choice');
    if (!choice) {
      // Show banner by removing d-none
      banner.classList.remove('d-none');
    }

    btnAccept.addEventListener('click', function () {
      localStorage.setItem('cookie-consent-choice', 'accepted');
      if (typeof gtag === 'function') {
        gtag('consent', 'update', {
          'analytics_storage': 'granted',
          'ad_storage': 'granted',
          'ad_user_data': 'granted',
          'ad_personalization': 'granted'
        });
      }
      if (typeof ga === 'function') {
        ga('send', 'pageview');
      }
      hideBanner();
    });

    btnDecline.addEventListener('click', function () {
      localStorage.setItem('cookie-consent-choice', 'rejected');
      if (typeof gtag === 'function') {
        gtag('consent', 'update', {
          'analytics_storage': 'denied',
          'ad_storage': 'denied',
          'ad_user_data': 'denied',
          'ad_personalization': 'denied'
        });
      }
      hideBanner();
    });

    function hideBanner() {
      banner.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
      banner.style.opacity = '0';
      banner.style.transform = 'translateY(20px)';
      setTimeout(function () {
        banner.classList.add('d-none');
      }, 400);
    }
  })();
</script>
{% endif %}
