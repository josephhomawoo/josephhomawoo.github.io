<section class="section section-on-footer">
  <div class="container">
    <div class="row">
      <div class="col-12 text-center">
        <h2 class="section-title">{{ site.data.settings.sections.contact_title }}</h2>
      </div>
      <div class="col-lg-8 mx-auto">
        <div class="glass rounded text-center p-5">
          <h4 class="mb-80 text-white">{{ site.data.settings.labels.contact_form_title }}</h4>
          <form action="https://formspree.io/f/maykdgvn" method="POST" class="row">
            <input type="text" name="_gotcha" style="display:none">
            <div class="col-md-6">
              <input type="text" id="name" name="name" placeholder="{{ site.data.settings.labels.name_placeholder }}" class="form-control px-0 mb-4">
            </div>
            <div class="col-md-6">
              <input type="email" id="email" name="_replyto" placeholder="{{ site.data.settings.labels.email_placeholder }}" class="form-control px-0 mb-4">
            </div>
            <div class="col-12">
              <textarea name="message" id="message" class="form-control px-0 mb-4"
                placeholder="{{ site.data.settings.labels.message_placeholder }}"></textarea>
            </div>
            <div class="col-lg-6 col-10 mx-auto">
              <button type="submit" class="btn btn-primary w-100">{{ site.data.settings.labels.send }}</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
