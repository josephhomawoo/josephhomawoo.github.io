<!-- about -->
<section class="section">
  <div class="container">
    <div class="row align-items-center">
      <div class="col-lg-6 mb-4 mb-lg-0" data-aos="fade-right">
        <div class="glass p-5 rounded-lg border-primary" style="border-left: 5px solid $primary-color !important;">
          <h2 class="text-white mb-4">Mastering Complexity</h2>
          <p class="font-secondary paragraph-lg text-color-dark mb-4">
            {{ site.data.settings.blurb }}
          </p>
          <a href="{{ site.data.settings.blurb-btn-link }}" class="btn btn-primary">{{ site.data.settings.blurb-btn-name }}</a>
        </div>
      </div>
      <div class="col-lg-6">
        <div class="row g-3">
          <div class="col-6" data-aos="zoom-in" data-aos-delay="100">
            <div class="glass p-4 text-center rounded-lg">
              <h2 class="text-primary mb-0">{{ site.data.settings.stats.years_exp }}</h2>
              <small class="text-secondary uppercase">Years Exp</small>
            </div>
          </div>
          <div class="col-6" data-aos="zoom-in" data-aos-delay="200">
            <div class="glass p-4 text-center rounded-lg">
              <h2 class="text-success mb-0">{{ site.data.settings.stats.systems_built }}</h2>
              <small class="text-secondary uppercase">Systems Built</small>
            </div>
          </div>
          <div class="col-12" data-aos="fade-up" data-aos-delay="300">
            <div class="glass p-4 text-center rounded-lg">
              <p class="mb-0 text-white italic">"{{ site.data.settings.stats.quote }}"</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
<!-- /about -->
